<!DOCTYPE html>
<html lang="ja">
<head>
	<title>言及対象辞書エディタ</title>
	<meta name="author" content="Ryo-1101">
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="description" content="100文字程度のサイトの説明">
	<link rel="shortcut icon" href="./assets/images/logo.png" type="image/x-icon">
	<!-- <meta name="robots" content="noindex,nofollow"> -->
	<meta name="format-detection" content="email=no,telephone=no,address=no">

	<meta prefix="og: http://ogp.me/ns# fb: http://ogp.me/ns/fb# website: http://ogp.me/ns/website#">
	<meta property="og:type" content="website">
	<meta property="og:url" content="ページURL">
	<meta property="og:title" content="ページ名ブランド情報なし20字以内">
	<meta property="og:description" content="90字以内の説明">
	<meta property="og:site_name" content="BIGAN辞書エディタ">
	<meta property="og:image" content="埋め込み用画像絶対パス">

	<link rel="stylesheet" href="./style/normalize.css">
	<link rel="stylesheet" href="./style/style.css">
	<!-- <link rel="stylesheet" href="./style/tmp.css"> -->
</head>
<body id="topic">
	<header>
		<h1>BIGAN 言及対象辞書エディタ β</h1>
		<div class="unsavedTime">
			経過時間
			<span>00:00</span>
		</div>
		<button id="exportFile" hidden>保存</button>
	</header>
	<main>
		<!-- #MARK: 本番では最初にhiddenする -->
		<div class="wordSelect" id="wordSelectWrapper">
			<h2>単語を選択</h2>
			<ol id="wordSelectContent">
				<!-- refreshWordSelectで中身を更新 -->
				<li><button>つかいかた</button></li>
				<li><button>専用ファイルを上げたら</button></li>
				<li><button>まずは単語をここから選び</button></li>
				<li><button>好きなようにいじる</button></li>
				<li><button>保存を忘れずに</button></li>
			</ol>
		</div>
		<div class="wordEdit">
			<div class="fileRead">
				<h2>keysFromTopic.csvをアップロードしてね</h2>
				<div class="fileRead-wrapper">
					<input type="file" name="" id="fileRead" draggable="">
				</div>
			</div>

			<div class="wordChoose" hidden>
				<h2>単語を追加/編集</h2>
				<input type="text" name="" id="wordKeyName">
				<button>＋</button>
				<button hidden>－</button>
			</div>

			<div id="keySelect" hidden>
				<!-- 画像 -->
				<div class="g" id="ksg-img">
					<input type="checkbox" id="ks-IL">
					<label for="ks-IL" class="">IL 左</label>
					<input type="checkbox" id="ks-IR">
					<label for="ks-IR" class="">IR 右</label>
				</div>
				
				<!-- keySelectGroup -->
				<div class="g" id="ksg-general">
					<button id="ks-H">H 色相</button>
					<button id="ks-S">S 彩度</button>
					<button id="ks-L">L 明度</button>
					<button id="ks-A">A <small>不透明度</small></button>
					<button id="ks-T">T 種類</button>
				</div>

				<div class="g" id="ksg-category">
					<button id="ks-GB">GB 背景</button>
					<button id="ks-GF">GF 図形</button>
					<button id="ks-GR">GR <small>繰り返し</small></button>
					<button id="ks-GS">GS 縁取り</button>
				</div>

				<button id="ks-GG">GG グラデ</button>
				<input type="checkbox" id="ks-GCX">
				<label for="ks-GCX">GCX<br>左右</label>
				<input type="checkbox" id="ks-GCY">
				<label for="ks-GCY">GCY<br>上下</label>
				<div class="g" id="ksg-gradient">
					<input type="checkbox" id="ks-GGC">
					<label for="ks-GGC" class="wide thin">GGC 中心<br></label>
					<input type="checkbox" id="ks-GWL">
					<label for="ks-GWL" class="wide thin">GWL 波長<br></label>
					<input type="checkbox" id="ks-GWA">
					<label for="ks-GWA" class="wide thin">GWA 位相<br></label>
					<input type="checkbox" id="ks-GWS">
					<label for="ks-GWS" class="wide thin">GWS 波形<br></label>	
				</div>
				
				<div class="g" id="ksg-background">
					<input type="checkbox" id="ks-GBH">
					<label for="ks-GBH">GBH<br></label>
					<input type="checkbox" id="ks-GBS">
					<label for="ks-GBS">GBS<br></label>
					<input type="checkbox" id="ks-GBL">
					<label for="ks-GBL">GBL<br></label>
					<input type="checkbox" id="ks-GGT">
					<label for="ks-GGT">GGT<br></label>
					<button id="ks-R">GR 回転</button>
					<button id="ks-Z">GZ サイズ</button>
				</div>

				<div class="g" id="ksg-fill">
					<input type="checkbox" id="ks-GFH">
					<label for="ks-GFH">GFH<br></label>
					<input type="checkbox" id="ks-GFS">
					<label for="ks-GFS">GFS<br></label>
					<input type="checkbox" id="ks-GFL">
					<label for="ks-GFL">GFL<br></label>
					<input type="checkbox" id="ks-GFA">
					<label for="ks-GFA">GFA<br></label>
					<input type="checkbox" id="ks-GFT">
					<label for="ks-GFT">GFT<br></label>
					<input type="checkbox" id="ks-GFR">
					<label for="ks-GFR">GFR<br></label>
					<input type="checkbox" id="ks-GFZ">
					<label for="ks-GFZ">GFZ<br></label>
				</div>

				<div class="g" id="ksg-repeatColor">
					<input type="checkbox" id="ks-GRH">
					<label for="ks-GRH">GRH<br></label>
					<input type="checkbox" id="ks-GRS">
					<label for="ks-GRS">GRS<br></label>
					<input type="checkbox" id="ks-GRL">
					<label for="ks-GRL">GRL<br></label>
				</div>

				<div class="g" id="ksg-repeatStyle">
					<input type="checkbox" id="ks-GRR">
					<label for="ks-GRR">GRR<br></label>
					<input type="checkbox" id="ks-GRZ">
					<label for="ks-GRZ">GRZ<br></label>
					<input type="checkbox" id="ks-GRD">
					<label for="ks-GRD" class="wide thin">GRD 方向</label>
					<input type="checkbox" id="ks-GRC">
					<label for="ks-GRC" class="wide thin">GRC 回数</label>
				</div>

				<div class="g" id="ksg-stroke">
					<input type="checkbox" id="ks-GSH">
					<label for="ks-GSH">GSH<br></label>
					<input type="checkbox" id="ks-GSS">
					<label for="ks-GSS">GSS<br></label>
					<input type="checkbox" id="ks-GSL">
					<label for="ks-GSL">GSL<br></label>
					<input type="checkbox" id="ks-GSA">
					<label for="ks-GSA">GSA<br></label>	
				</div>

				<div class="g" id="ksg-strokeWidth">
					<input type="checkbox" id="ks-GSW">
					<label for="ks-GSW" class="wide thin">GSW 幅</label>
				</div>

				<div class="g" id="ksg-stat">
					<input type="checkbox" id="ks-ICA">
					<label for="ks-ICA" class="wide thin">ICA 明瞭さ</label>
					<input type="checkbox" id="ks-ICE">
					<label for="ks-ICE" class="wide thin">ICE 綺麗さ</label>
					<input type="checkbox" id="ks-IAL">
					<label for="ks-IAL" class="wide thin">IAL 対称性</label>
					<input type="checkbox" id="ks-IAB">
					<label for="ks-IAB" class="wide thin">IAB 多さ</label>
					<input type="checkbox" id="ks-IBT">
					<label for="ks-IBT" class="wide thin">IBT 明るさ</label>
					<input type="checkbox" id="ks-IWM">
					<label for="ks-IWM" class="wide thin">IWM 暖かさ</label>
					<input type="checkbox" id="ks-ISH">
					<label for="ks-ISH" class="wide thin">ISH 鋭さ</label>
					<input type="checkbox" id="ks-ISM">
					<label for="ks-ISM" class="wide thin">ISM 滑らかさ</label>
				</div>
			</div>
		</div>
	</main>
	<div id="wordSelectControl" class="hidden">
		<h4 id="wordSelectControl-name">単語名</h4>
		<span>#</span>
		<input type="number" id="wordSelectControl-switchOrder" min="1" step="1">
		<button id="wordSelectControl-moveTo">へ移動</button>
		<button id="wordSelectControl-add">新規</button>
		<button id="wordSelectControl-delete" class="hov-warn">削除</button>
	</div>
</body>
<script type="module" src="./script/topic.js"></script>
</html>
